<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greeting Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .greeting-card {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #ffffff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
      transition: transform 0.2s ease;
      max-width: 420px;
      width: 100%;
    }

    .greeting-card:hover {
      transform: scale(1.05);
    }

    .greeting-card h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .greeting-card p {
      font-size: 1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="greeting-card">
    <h1>Hello, Co-Design!</h1>
    <p>This was built by a design agent</p>
  </div>
</body>
</html>
