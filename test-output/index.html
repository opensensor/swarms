<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Co-Design Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1.page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    /* Greeting card (from GreetingCard.html component) */
    .greeting-card {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #ffffff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
      transition: transform 0.2s ease;
      max-width: 420px;
      width: 100%;
      margin: 0 auto 2.5rem;
    }

    .greeting-card:hover {
      transform: scale(1.05);
    }

    .greeting-card h2 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .greeting-card p {
      font-size: 1rem;
      opacity: 0.9;
    }

    /* Utility functions demo section */
    .utils-section {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .utils-section h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .demo-item {
      border-bottom: 1px solid #eee;
      padding: 1rem 0;
    }

    .demo-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .demo-item h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #555;
    }

    .demo-item code {
      display: inline-block;
      background: #f0f0f0;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    .demo-item .result {
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .demo-item .result span {
      font-weight: 600;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="page-title">Co-Design Demo</h1>

    <!-- Greeting Card Component (sourced from components/GreetingCard.html) -->
    <div class="greeting-card">
      <h2>Hello, Co-Design!</h2>
      <p>This was built by a design agent</p>
    </div>

    <!-- Utility Functions Demo -->
    <section class="utils-section">
      <h2>Utility Functions</h2>
      <div id="demos"></div>
    </section>
  </div>

  <script type="module">
    import { formatDate, capitalize, slugify } from './utils/helpers.js';

    const demos = [
      {
        name: 'formatDate',
        input: 'new Date(2026, 1, 8)',
        run: () => formatDate(new Date(2026, 1, 8)),
      },
      {
        name: 'capitalize',
        input: '"hello world"',
        run: () => capitalize('hello world'),
      },
      {
        name: 'slugify',
        input: '"Co-Design Test Plan!"',
        run: () => slugify('Co-Design Test Plan!'),
      },
    ];

    const container = document.getElementById('demos');

    demos.forEach(({ name, input, run }) => {
      const result = run();
      const div = document.createElement('div');
      div.className = 'demo-item';
      div.innerHTML = `
        <h3>${name}()</h3>
        <div>Input: <code>${input}</code></div>
        <div class="result">Output: <span>${result}</span></div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>
